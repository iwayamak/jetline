sub_module:
-
  name: PostgreSQLProcessing
  mode:
  param:
    postgresql_component_key: POSTGRESQL_COMPONENT.ID=UT
    sql_file_name: sample_yaml/sql/common/postgresql_drop_table.sql
    input_value:
      schema: public
      table: test_postgresql_copy_from
-
  name: PostgreSQLProcessing
  mode:
  param:
    postgresql_component_key: POSTGRESQL_COMPONENT.ID=UT
    sql_file_name: sample_yaml/sql/common/postgresql_create_table.sql
    input_value:
      schema: public
      table: test_postgresql_copy_from
-
  name: PostgreSQLCopyFrom
  mode:
  param:
    postgresql_component_key: POSTGRESQL_COMPONENT.ID=UT
    table_name: test_postgresql_copy_from
    csv_file_name: sample_yaml/test_data/test_postgresql_copy_from.csv
    gzip: False
-
  name: PostgreSQLProcessing
  mode: Count
  param:
    postgresql_component_key: POSTGRESQL_COMPONENT.ID=UT
    sql_file_name: sample_yaml/sql/common/postgresql_count.sql
    input_value:
      schema: public
      table: test_postgresql_copy_from
    assert_eq: 3